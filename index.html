<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <title>Travel Explorer</title> -->
     <title>Travel Explorer | Explore The World</title>
    <!-- <link rel="icon" type="image/png" href="favicon.png"> -->
     <link rel="icon" type="image/png" href="favicon.png?v=2">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">TravelExplorer</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#destinations">Destinations</a></li>
                    <li class="nav-item"><a class="nav-link" href="#packages">Packages</a></li>
                    <li class="nav-item"><a class="nav-link" href="#gallery">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
                </ul>
                <button id="darkToggle" class="btn btn-outline-light ms-3">🌙</button>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section id="home" class="hero">
        <div class="hero-content text-center text-white">
            <h1 class="display-3 fw-bold">Explore The World</h1>
            <p class="lead">Discover beautiful places with premium travel experiences</p>

            <input type="text" id="searchInput"
                class="form-control search-box mx-auto mt-4"
                placeholder="Search destination...">
        </div>
    </section>

    <!-- DESTINATIONS -->
    <section id="destinations" class="py-5 fade-section">
        <div class="container">
            <h2 class="text-center section-title">Popular Destinations</h2>
            <div class="row mt-4" id="destinationContainer"></div>
        </div>
    </section>

    <!-- PACKAGES -->
    <section id="packages" class="py-5 bg-light fade-section">
        <div class="container">
            <h2 class="text-center section-title">Tour Packages</h2>

            <div class="text-end mt-3">
                <select id="priceFilter" class="form-select w-25 d-inline">
                    <option value="all">All</option>
                    <option value="low">Below $1000</option>
                    <option value="high">Above $1000</option>
                </select>
            </div>

            <div class="row mt-4" id="packageContainer"></div>
        </div>
    </section>

    <!-- GALLERY -->
    <section id="gallery" class="py-5 fade-section">
        <div class="container">
            <h2 class="text-center section-title">Travel Gallery</h2>
            <div class="row g-4 mt-4">
                <div class="col-md-3"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80" class="gallery-img"></div>
                <div class="col-md-3"><img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1200&q=90" class="gallery-img"></div>
                <div class="col-md-3"><img src="https://images.unsplash.com/photo-1473625247510-8ceb1760943f?auto=format&fit=crop&w=800&q=80" class="gallery-img"></div>
                <!-- <div class="col-md-3"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80" class="gallery-img"></div> -->
                 <div class="col-md-3">
    <img src="https://images.unsplash.com/photo-1707343848552-893e05dba6ac?q=80&w=2070&auto=format&fit=crop"
         class="gallery-img"
         alt="Mountain view">
</div>
            </div>
        </div>
    </section>

    <!-- CONTACT -->
    <section id="contact" class="py-5 bg-light fade-section">
        <div class="container">
            <h2 class="text-center section-title">Contact Us</h2>
            <form id="contactForm" class="w-50 mx-auto mt-4">
                <input type="text" class="form-control mb-3" placeholder="Name" required>
                <input type="email" class="form-control mb-3" placeholder="Email" required>
                <textarea class="form-control mb-3" placeholder="Message" required></textarea>
                <button class="btn btn-primary w-100">Send Message</button>
            </form>
        </div>
    </section>

    <footer class="text-center">
        <p>© 2026 TravelExplorer | All Rights Reserved</p>
        <p>Dattopant Dange</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
